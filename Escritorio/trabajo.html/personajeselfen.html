<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Anime Elfen Lied</title>

<style>

body{
    margin:0;
    background:linear-gradient(rgba(255,0,98,0.4), #3b0000);
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    color:#ff4da6;
}

input{
    padding:10px;
    width:250px;
    border-radius:10px;
    border:none;
    margin:20px;
}

.contenedor{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    background:#111;
    width:230px;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.08);
    box-shadow:0px 0px 25px #000000;
}

.card img{
    width:100%;
    height:300px;
}

.info{
    padding:10px;
}

.info h3{
    color:#ff4da6;
}

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:#111;
    padding:20px;
    border-radius:15px;
    width:300px;
}

</style>

</head>

<body>

<h1>🌸 Personajes de Elfen Lied 🌸</h1>

<input type="text" id="buscador" placeholder="Buscar personaje...">

<div class="contenedor">

<img src="imagenes/lucy.jpg">

</div>

</div>

</div>

<div class="info">

</div>

</div>


<div class="card" data-name="yuka">

<img src="imagenes/yuka.jpg">

<div class="info">
<h3>Yuka</h3>
<p>Amiga de la infancia.</p>
</div>

</div>


<div class="card" data-name="nana">

<img src="imagenes/nana.jpg">

</div>

</div>


<div class="popup" id="popup">

</button>

</div>
